<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0f172a"/>
  <circle cx="32" cy="32" r="30" fill="url(#grad)" opacity="0.15"/>
  <!-- Cloud shape -->
  <g filter="url(#glow)">
    <path d="M44 38H22c-4.4 0-8-3.6-8-8 0-3.9 2.8-7.1 6.5-7.8C21.3 18.1 25.2 15 30 15c5.2 0 9.5 3.7 10.5 8.5 0.3 0 0.7-0.1 1-0.1 3.6 0 6.5 2.9 6.5 6.5 0 0.5-0.1 1-0.2 1.5C50.1 32.5 52 35 52 38c0 3.9-3.1 7-7 7h-1" stroke="url(#grad)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Upload arrow -->
    <path d="M32 48V36M32 36l-5 5M32 36l5 5" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
