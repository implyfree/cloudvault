<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030712" />
    <meta name="description" content="CloudVault - Secure cloud storage management" />
    <title>CloudVault - Cloud Storage</title>
    <!-- Favicon & PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      /* Critical CSS for faster initial paint */
      :root { --loader-bg: #0a0a0f; --loader-accent: #6366f1; }
      [data-theme="light"] { --loader-bg: #f8fafc; --loader-accent: #4f46e5; }
      body {
        margin: 0;
        background: var(--loader-bg);
        font-family: 'Inter', system-ui, sans-serif;
        transition: background 0.3s;
      }
      .initial-loader {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
      }
      .initial-loader svg {
        width: 64px;
        height: 64px;
        animation: pulse 2s ease-in-out infinite;
        filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.4));
      }
      .initial-loader .spinner {
        width: 32px;
        height: 32px;
        border: 2px solid rgba(128,128,128,0.15);
        border-top-color: var(--loader-accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.05); }
      }
    </style>
    <script>
      // Apply saved theme immediately to prevent flash
      (function() {
        var theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#3b82f6"/>
              <stop offset="100%" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
          <rect x="2" y="2" width="60" height="60" rx="14" fill="#0f172a"/>
          <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#g)" fill-opacity="0.15"/>
          <path d="M44 40H24c-3.9 0-7-3.1-7-7 0-3.4 2.4-6.2 5.6-6.8C23.4 22.4 26.8 20 31 20c4.5 0 8.3 3.2 9.2 7.4.3 0 .5-.1.8-.1 3.1 0 5.7 2.5 5.7 5.7 0 .4-.1.9-.2 1.3C48.5 35.2 50 37.4 50 40c0 3.3-2.7 6-6 6" stroke="url(#g)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M32 48V38M32 38l-4 4M32 38l4 4" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
