apiVersion: v1
kind: Service
metadata:
  name: cloudvault
  namespace: cloudvault
  labels:
    app.kubernetes.io/name: cloudvault
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: cloudvault
