apiVersion: v1
kind: Secret
metadata:
  name: cloudvault-secrets
  namespace: cloudvault
  labels:
    app.kubernetes.io/name: cloudvault
type: Opaque
stringData:
  # PostgreSQL connection string
  # Format: postgresql://user:password@host:port/database
  # The password must match POSTGRES_PASSWORD in postgres-secrets
  DATABASE_URL: "postgresql://cloudvault:CHANGE_ME_TO_SECURE_PASSWORD@postgres:5432/cloudvault"
  
  # JWT Secret for session tokens
  # Generate with: openssl rand -hex 32
  JWT_SECRET: "CHANGE_ME_TO_A_RANDOM_64_CHAR_HEX_STRING"
  
  # Encryption key for cloud provider credentials stored in database
  # Generate with: openssl rand -hex 32
  ENCRYPTION_KEY: "CHANGE_ME_TO_ANOTHER_RANDOM_64_CHAR_HEX_STRING"
  
  # Initial admin password (change after first login via UI)
  ADMIN_PASSWORD: "admin"
  
# NOTE: Cloud provider credentials (GCP, AWS, Azure, etc.) are now
# managed through the Admin UI -> Providers section.
# They are encrypted and stored in the PostgreSQL database.
# No need to add them here anymore!
