apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudvault
  namespace: cloudvault
  labels:
    app.kubernetes.io/name: cloudvault
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: app
spec:
  # Start with 2 replicas, HPA will scale as needed
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudvault
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudvault
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      # Wait for PostgreSQL to be ready
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done; echo postgres is ready']
      containers:
        - name: cloudvault
          # Replace with your actual image registry/repository
          # Example: gcr.io/your-project/cloudvault:latest
          # Example: your-dockerhub-user/cloudvault:latest
          image: cloudvault:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            # PostgreSQL connection string
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cloudvault-secrets
                  key: DATABASE_URL
            # JWT Secret for session tokens
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cloudvault-secrets
                  key: JWT_SECRET
            # Initial admin password
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloudvault-secrets
                  key: ADMIN_PASSWORD
            # Encryption key for cloud provider credentials stored in DB
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: cloudvault-secrets
                  key: ENCRYPTION_KEY
          # No volumeMounts needed - app is now stateless!
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      # No volumes needed - app is stateless!
      # Optional: If using private registry
      # imagePullSecrets:
      #   - name: regcred
