{{- $secretName := include "cloudvault.fullname" . }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "cloudvault.labels" . | nindent 4 }}
  annotations:
    # Prevent Helm from deleting this secret on uninstall/upgrade
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  # JWT secret for session tokens
  # Preserves existing value on upgrade to maintain user sessions
  {{- if .Values.app.jwtSecret }}
  JWT_SECRET: {{ .Values.app.jwtSecret | quote }}
  {{- else if and $existingSecret $existingSecret.data.JWT_SECRET }}
  JWT_SECRET: {{ $existingSecret.data.JWT_SECRET | b64dec | quote }}
  {{- else }}
  JWT_SECRET: {{ randAlphaNum 64 | quote }}
  {{- end }}
  
  # Encryption key for cloud credentials
  # CRITICAL: Must be preserved across upgrades or encrypted data becomes unreadable!
  {{- if .Values.app.encryptionKey }}
  ENCRYPTION_KEY: {{ .Values.app.encryptionKey | quote }}
  {{- else if and $existingSecret $existingSecret.data.ENCRYPTION_KEY }}
  ENCRYPTION_KEY: {{ $existingSecret.data.ENCRYPTION_KEY | b64dec | quote }}
  {{- else }}
  ENCRYPTION_KEY: {{ randAlphaNum 64 | quote }}
  {{- end }}
  
  # Admin credentials (only used on first startup when no admin user exists in DB)
  ADMIN_PASSWORD: {{ .Values.app.adminPassword | quote }}

{{- if and (not .Values.postgresql.enabled) (not .Values.externalDatabase.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cloudvault.fullname" . }}-external-db
  labels:
    {{- include "cloudvault.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.externalDatabase.password | quote }}
{{- end }}
