services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudvault-db
    environment:
      POSTGRES_USER: cloudvault
      POSTGRES_PASSWORD: cloudvault
      POSTGRES_DB: cloudvault
    ports:
      - "5432:5432"
    volumes:
      - cloudvault_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudvault -d cloudvault"]
      interval: 3s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: cloudvault-app
    environment:
      DATABASE_URL: postgresql://cloudvault:cloudvault@postgres:5432/cloudvault
      DB_SSL: "false"
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  cloudvault_pgdata:
